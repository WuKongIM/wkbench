version: wkbench/v2

run:
  id: wukongim-send-rate-with-metrics
  duration: 5s
  report_dir: ./reports/send-rate-with-metrics

vars:
  users: 30
  groups: 3
  members: 10
  person_pairs: 10
  group_rate: 3/s
  person_rate: 6/s

units:
  target:
    use: wukongim.target
    spec:
      api_addrs:
        - http://127.0.0.1:5011
        - http://127.0.0.1:5012
        - http://127.0.0.1:5013
      gateway_tcp_addrs:
        - 127.0.0.1:5111
        - 127.0.0.1:5112
        - 127.0.0.1:5113
      bench_api_token: ""
      operation_timeout: 5s

  metrics:
    use: wukongim.metrics_collector
    after: [target]
    inputs:
      target: target.target
    spec:
      interval: 1s
      timeout: 800ms
      path: /metrics
      include:
        - wk_.*
        - wukongim_.*
      exclude:
        - go_.*
        - process_.*
      fail_on_scrape_error: false
      max_summary_metrics: 100

  identities:
    use: identity.pool
    after: [metrics]
    spec:
      total: ${users}
      uid_prefix: bench-metrics-u
      device_prefix: bench-metrics-d
      token_prefix: bench-metrics-token

  tokens:
    use: wukongim.prepare_tokens
    after: [metrics]

  groups:
    use: wukongim.prepare_group_channels
    after: [metrics]
    spec:
      profile: send-rate-with-metrics
      count: ${groups}
      members_per_channel: ${members}
      overlap: disallowed
      batch_size: 1000

  pairs:
    use: identity.person_pairs
    after: [metrics]
    spec:
      count: ${person_pairs}
      mode: ring
      bidirectional: true

  sessions:
    use: wkproto.session_pool
    after: [metrics, tokens, groups]
    spec:
      connect_rate: 100/s

  group_traffic:
    use: traffic.send
    after: [metrics]
    inputs:
      targets: groups.targets
      sender: sessions.message_sender
    spec:
      rate: ${group_rate}
      payload_size: 128
      sender_pick: round_robin
      max_in_flight: 8
      ack_timeout: 5s

  person_traffic:
    use: traffic.send
    after: [metrics]
    inputs:
      targets: pairs.targets
      sender: sessions.message_sender
    spec:
      rate: ${person_rate}
      payload_size: 128
      sender_pick: round_robin
      max_in_flight: 8
      ack_timeout: 5s

  group_limits:
    use: report.assert
    inputs:
      summary: group_traffic.summary
    spec:
      rules:
        - metric: sendack_error_rate
          op: eq
          value: 0

  person_limits:
    use: report.assert
    inputs:
      summary: person_traffic.summary
    spec:
      rules:
        - metric: sendack_error_rate
          op: eq
          value: 0
